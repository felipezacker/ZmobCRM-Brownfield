name: PR Quality Summary

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open',
            });
            if (prs.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', prs[0].number);

      - name: Get CI job results
        if: steps.pr.outputs.found == 'true'
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const getStatus = (name) => {
              const job = jobs.jobs.find(j => j.name === name);
              return job?.conclusion === 'success' ? 'pass' : 'fail';
            };

            core.setOutput('lint', getStatus('Lint'));
            core.setOutput('typecheck', getStatus('TypeCheck'));
            core.setOutput('test', getStatus('Test'));
            core.setOutput('build', getStatus('Build'));

      - name: Post Quality Comment
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const icon = (s) => s === 'pass' ? '✅' : '❌';
            const lint = icon('${{ steps.ci.outputs.lint }}');
            const typecheck = icon('${{ steps.ci.outputs.typecheck }}');
            const test = icon('${{ steps.ci.outputs.test }}');
            const build = icon('${{ steps.ci.outputs.build }}');

            const body = `## Quality Gate Summary

            | Check | Status |
            |-------|--------|
            | Lint | ${lint} |
            | TypeCheck | ${typecheck} |
            | Tests | ${test} |
            | Build | ${build} |

            ---
            _Automated by AIOS DevOps_`;

            const prNumber = ${{ steps.pr.outputs.number }};
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('Quality Gate Summary'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
