name: PR Quality Summary

on:
  pull_request:
    branches: [main, develop]

permissions:
  pull-requests: write
  contents: read

jobs:
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run Lint
        id: lint
        run: |
          if npm run lint 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run TypeCheck
        id: typecheck
        run: |
          if npm run typecheck 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run Tests
        id: test
        run: |
          if npm run test:run 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Post Quality Comment
        uses: actions/github-script@v7
        with:
          script: |
            const lint = '${{ steps.lint.outputs.status }}' === 'pass' ? '✅' : '❌';
            const typecheck = '${{ steps.typecheck.outputs.status }}' === 'pass' ? '✅' : '❌';
            const test = '${{ steps.test.outputs.status }}' === 'pass' ? '✅' : '❌';

            const body = `## Quality Gate Summary

            | Check | Status |
            |-------|--------|
            | Lint | ${lint} |
            | TypeCheck | ${typecheck} |
            | Tests | ${test} |

            ---
            _Automated by AIOS DevOps_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('Quality Gate Summary'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
