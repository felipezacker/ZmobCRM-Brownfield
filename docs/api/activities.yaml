components:
  schemas:
    Activity:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: [string, 'null'] }
        type: { type: string }
        date: { type: string }
        completed: { type: boolean }
        deal_id: { type: [string, 'null'] }
        contact_id: { type: [string, 'null'] }
        created_at: { type: string }
      required:
        - id
        - title
        - description
        - type
        - date
        - completed
        - deal_id
        - contact_id
        - created_at

paths:
  /activities:
    get:
      tags: [Activities]
      summary: Listar atividades
      security:
        - ApiKeyAuth: []
      parameters:
        - name: deal_id
          in: query
          schema: { type: string }
        - name: contact_id
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 250 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'
                  nextCursor:
                    type: [string, 'null']
                required: [data, nextCursor]
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

    post:
      tags: [Activities]
      summary: Criar atividade
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'
