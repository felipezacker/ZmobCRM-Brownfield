components:
  schemas:
    Deal:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        title: { type: string }
        value: { type: number }
        board_id: { type: string }
        stage_id: { type: string }
        contact_id: { type: string }
        is_won: { type: boolean }
        is_lost: { type: boolean }
        loss_reason: { type: [string, 'null'] }
        closed_at: { type: [string, 'null'] }
        created_at: { type: string }
        updated_at: { type: string }
      required:
        - id
        - title
        - value
        - board_id
        - stage_id
        - contact_id
        - is_won
        - is_lost
        - loss_reason
        - closed_at
        - created_at
        - updated_at

paths:
  /deals:
    get:
      tags: [Deals]
      summary: Listar deals
      security:
        - ApiKeyAuth: []
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: board_id
          in: query
          schema: { type: string }
        - name: board_key
          in: query
          schema: { type: string }
        - name: stage_id
          in: query
          schema: { type: string }
        - name: contact_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [open, won, lost] }
        - name: updated_after
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 250 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Deal'
                  nextCursor:
                    type: [string, 'null']
                required: [data, nextCursor]
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

    post:
      tags: [Deals]
      summary: Criar deal
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

  /deals/{dealId}:
    get:
      tags: [Deals]
      summary: Obter deal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Deal'
                required: [data]
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

    patch:
      tags: [Deals]
      summary: Atualizar deal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

  /deals/{dealId}/move-stage:
    post:
      tags: [Deals]
      summary: Mover etapa do deal
      security:
        - ApiKeyAuth: []
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: false
                  properties:
                    to_stage_id:
                      type: string
                      description: UUID do estagio de destino
                    mark:
                      type: string
                      enum: [won, lost]
                      description: 'Opcional: marca o deal como ganho/perdido'
                  required: [to_stage_id]
                - type: object
                  additionalProperties: false
                  properties:
                    to_stage_label:
                      type: string
                      description: Label do estagio de destino (case-insensitive)
                    mark:
                      type: string
                      enum: [won, lost]
                      description: 'Opcional: marca o deal como ganho/perdido'
                  required: [to_stage_label]
            examples:
              byId:
                value: { to_stage_id: '00000000-0000-0000-0000-000000000000' }
              byLabel:
                value: { to_stage_label: 'Em conversa' }
              won:
                value: { to_stage_label: Ganho, mark: won }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

  /deals/move-stage-by-identity:
    post:
      tags: [Deals]
      summary: Mover etapa do deal por telefone/email (sem UUID)
      description: >
        Resolve o deal aberto dentro de um board usando phone e/ou email
        (regra: 1 deal aberto por board por telefone OU email) e move para a etapa indicada.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                board_key_or_id:
                  type: string
                  description: Key (slug) do board ou UUID do board
                phone:
                  type: string
                  description: 'Telefone E.164 (ex: +5511999999999)'
                email:
                  type: string
                  description: Email (lowercase recomendado)
                to_stage_label:
                  type: string
                  description: Label do estagio de destino (case-insensitive)
                to_stage_id:
                  type: string
                  description: UUID do estagio de destino (alternativa ao label)
                mark:
                  type: string
                  enum: [won, lost]
                  description: 'Opcional: marca o deal como ganho/perdido'
              required: [board_key_or_id]
            examples:
              phone:
                value: { board_key_or_id: sales, phone: '+5511999999999', to_stage_label: 'Em conversa' }
              email:
                value: { board_key_or_id: sales, email: ana@acme.com, to_stage_label: Proposta }
              won:
                value: { board_key_or_id: sales, phone: '+5511999999999', to_stage_label: Ganho, mark: won }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

  /deals/move-stage:
    post:
      tags: [Deals]
      summary: Mover etapa do deal (UUID ou telefone/email)
      description: >
        Move etapa via deal_id (UUID) ou via board_key_or_id + phone/email (sem UUID).
        Preferir usar to_stage_label.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: false
                  properties:
                    deal_id:
                      type: string
                      description: UUID do deal
                    to_stage_label: { type: string }
                    to_stage_id: { type: string }
                    mark:
                      type: string
                      enum: [won, lost]
                      description: 'Opcional: marca o deal como ganho/perdido'
                  required: [deal_id]
                - type: object
                  additionalProperties: false
                  properties:
                    board_key_or_id:
                      type: string
                      description: Key (slug) do board ou UUID do board
                    phone:
                      type: string
                      description: 'Telefone E.164 (ex: +5511999999999)'
                    email:
                      type: string
                      description: Email (lowercase recomendado)
                    to_stage_label: { type: string }
                    to_stage_id: { type: string }
                    mark:
                      type: string
                      enum: [won, lost]
                      description: 'Opcional: marca o deal como ganho/perdido'
                  required: [board_key_or_id]
            examples:
              byDealId:
                value: { deal_id: '00000000-0000-0000-0000-000000000000', to_stage_label: 'Em conversa' }
              byPhone:
                value: { board_key_or_id: sales, phone: '+5511999999999', to_stage_label: 'Em conversa' }
              won:
                value: { board_key_or_id: sales, phone: '+5511999999999', to_stage_label: Ganho, mark: won }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

  /deals/{dealId}/mark-won:
    post:
      tags: [Deals]
      summary: Marcar como ganho
      security:
        - ApiKeyAuth: []
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'

  /deals/{dealId}/mark-lost:
    post:
      tags: [Deals]
      summary: Marcar como perdido
      security:
        - ApiKeyAuth: []
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                loss_reason: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object }
        '401':
          $ref: 'openapi.yaml#/components/responses/Unauthorized'
